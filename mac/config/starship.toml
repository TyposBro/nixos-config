add_newline = true

format = """
[Ô×£](bold mauve) [$directory]($style)\
$git_branch\
$git_status\
$nodejs$rust$python$golang$java\
$cmd_duration\
$line_break\
$character"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"

[directory]
style = "bold sapphire"
truncation_length = 3
truncation_symbol = "ÔÇª/"
read_only = " ¾░î¥"
read_only_style = "red"

[git_branch]
symbol = " "
style = "bold peach"
format = " [$symbol$branch]($style)"

[git_status]
style = "bold red"
format = ' [$all_status$ahead_behind]($style)'
conflicted = "="
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ô£ÿ${count}"

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = " [Ôºù $duration]($style)"

[nodejs]
symbol = " "
style = "bold green"
format = " [$symbol$version]($style)"

[rust]
symbol = " "
style = "bold red"
format = " [$symbol$version]($style)"

[python]
symbol = " "
style = "bold yellow"
format = " [$symbol$version]($style)"

[golang]
symbol = " "
style = "bold sky"
format = " [$symbol$version]($style)"

[java]
symbol = " "
style = "bold red"
format = " [$symbol$version]($style)"

[character]
success_symbol = "[ÔØ»](bold mauve)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold green)"
